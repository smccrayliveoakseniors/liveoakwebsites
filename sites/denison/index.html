<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Oak Denison | Senior Living in Denison, Texas</title>
    <meta name="description" content="Live Oak Denison - Quality assisted living and memory care in Denison, Texas. Coming soon.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            color: #2a3a4a;
            padding: 2rem;
        }

        .container {
            text-align: center;
            max-width: 640px;
            width: 100%;
        }

        .logo-area {
            margin-bottom: 2rem;
        }

        .logo-area img {
            width: 220px;
            height: auto;
            margin-bottom: 0.5rem;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: #1a5da6;
            margin: 1.5rem auto;
            opacity: 0.4;
        }

        .coming-soon {
            font-size: 1.1rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: #6b8299;
            margin-bottom: 1rem;
        }

        .contact-info {
            margin-bottom: 2rem;
        }

        .contact-item {
            display: block;
            margin-bottom: 0.6rem;
            font-size: 0.95rem;
            color: #4a5e70;
            font-weight: 400;
            line-height: 1.6;
        }

        .contact-item a {
            color: #1a5da6;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .contact-item a:hover {
            color: #0d3f7a;
        }

        .contact-item .label {
            font-weight: 500;
            color: #2a3a4a;
        }

        .cta-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .cta-btn {
            display: inline-block;
            padding: 0.75rem 2rem;
            border: 1.5px solid #1a5da6;
            border-radius: 4px;
            text-decoration: none;
            color: #1a5da6;
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.03em;
            transition: all 0.3s ease;
        }

        .cta-btn:hover {
            background: #1a5da6;
            color: #ffffff;
        }

        .cta-btn.primary {
            background: #1a5da6;
            color: #ffffff;
        }

        .cta-btn.primary:hover {
            background: #0d3f7a;
            border-color: #0d3f7a;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #8a9bb0;
            font-weight: 300;
        }

        @media (max-width: 480px) {
            .logo-area img {
                width: 160px;
            }

            .cta-buttons {
                flex-direction: column;
                align-items: center;
            }

            .cta-btn {
                width: 100%;
                max-width: 280px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-area">
            <img src="logo.png" alt="Live Oak Denison">
        </div>

        <div class="divider"></div>

        <p class="coming-soon">Coming Soon</p>

        <div class="contact-info">
            <span class="contact-item">
                <span class="label">Address:</span> 1616 Lifesearch Way, Denison, TX 75020
            </span>
            <span class="contact-item">
                <span class="label">Phone:</span> <a href="tel:+19034655051">(903) 465-5051</a>
            </span>
            <span class="contact-item">
                <span class="label">Email:</span> <a href="mailto:inquiries@liveoakseniors.com">inquiries@liveoakseniors.com</a>
            </span>
        </div>

        <div class="cta-buttons">
            <a href="tel:+19034655051" class="cta-btn primary">Call Us</a>
            <a href="mailto:inquiries@liveoakseniors.com" class="cta-btn">Email Us</a>
        </div>

        <div class="footer">&copy; 2026 Live Oak Senior Care</div>
    </div>
</body>
</html>
